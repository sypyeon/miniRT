name: Make

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "recursive"
      - run: sudo apt-get update && sudo apt-get install -y libx11-dev libxext-dev libxrender-dev build-essential
      - run: make
